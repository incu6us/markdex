services:
  qdrant:
    image: qdrant/qdrant:v1.18.2
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  app:
    build: .
    restart: unless-stopped
    depends_on:
      - qdrant
    environment:
      QDRANT_URL: http://qdrant:6333
    ports:
      - "4334:4334"
    volumes:
      # persists the ~77MB embedding model across restarts (downloaded on first ingest)
      - model_cache:/app/model_cache

volumes:
  qdrant_storage:
  model_cache:
